name: Update map and deploy to GitHub Pages

on:
  repository_dispatch:
    types: [sheet-updated]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Google Sheet as CSV
        run: |
          curl -L -o input.csv \
            "https://docs.google.com/spreadsheets/d/${{ secrets.GOOGLE_SHEET_ID }}/export?format=csv"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run pipeline
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        run: |
          python convert_addresses.py
          python geocode.py
          python generate_map.py

      - name: Commit updated cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add geocoded_cache.json
          git diff --cached --quiet || git commit -m "Update geocoded cache"
          git pull --rebase origin main
          git push

      - name: Prepare deploy directory
        run: |
          mkdir -p _site
          cp index.html _site/
          cp geocoded_cache.json _site/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          force_orphan: true
